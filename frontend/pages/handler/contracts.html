<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同列表 - 企业合同管理系统</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div id="nav-container"></div>
  <div class="container">
    <div class="card">
      <h2>合同列表</h2>
      <div class="toolbar">
        <select id="status-filter">
          <option value="">全部状态</option>
          <option value="draft">草稿</option>
          <option value="review">审批中</option>
          <option value="approved">已通过</option>
          <option value="rejected">已驳回</option>
          <option value="signed">已签订</option>
          <option value="active">履行中</option>
          <option value="expired">已到期</option>
          <option value="archived">已归档</option>
        </select>
        <input type="text" id="search-input" class="search-input" placeholder="搜索合同标题或对方名称...">
        <a href="/pages/handler/contract-form.html" class="btn-primary btn-sm" style="text-decoration:none;color:#fff;">新建合同</a>
      </div>
      <table>
        <thead>
          <tr>
            <th>标题</th>
            <th>对方名称</th>
            <th>金额</th>
            <th>状态</th>
            <th>到期日期</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="contracts-table"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none;">暂无合同</div>
    </div>
  </div>
  <script type="module">
    import { apiRequest } from '/assets/js/api-client.js';
    import { checkSession, renderNav } from '/assets/js/session-ui.js';
    import { getStatusTag, formatDate, formatAmount } from '/assets/js/handler.js';

    const STATUS_MAP = {
      draft: '草稿',
      review: '审批中',
      approved: '已通过',
      rejected: '已驳回',
      signed: '已签订',
      active: '履行中',
      expired: '已到期',
      renewed: '已续签',
      archived: '已归档',
    };

    let currentUser = null;

    async function init() {
      currentUser = await checkSession();
      if (!currentUser) return;
      renderNav(currentUser);
      loadContracts();
    }

    async function loadContracts() {
      const status = document.getElementById('status-filter').value;
      const q = document.getElementById('search-input').value.trim();
      const params = new URLSearchParams();
      if (status) params.set('status', status);
      if (q) params.set('q', q);
      const result = await apiRequest('/api/v1/contracts?' + params.toString());
      if (result.error) {
        document.getElementById('contracts-table').innerHTML = `<tr><td colspan="6" class="error-message">${result.error.message}</td></tr>`;
        return;
      }
      renderContracts(result.contracts || []);
    }

    function renderContracts(contracts) {
      const tbody = document.getElementById('contracts-table');
      const empty = document.getElementById('empty-state');
      if (!contracts.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      tbody.innerHTML = contracts.map(c => `
        <tr>
          <td><a href="/pages/handler/contract-detail.html?id=${c.id}">${c.title}</a></td>
          <td>${c.counterparty}</td>
          <td>${c.amount ? formatAmount(c.amount) : '-'}</td>
          <td>${getStatusTag(c.status, STATUS_MAP[c.status] || c.status)}</td>
          <td>${c.expires_at ? formatDate(c.expires_at) : '-'}</td>
          <td>
            <a href="/pages/handler/contract-detail.html?id=${c.id}" class="btn-secondary btn-sm">查看</a>
            ${c.status === 'draft' || c.status === 'rejected' ? `<a href="/pages/handler/contract-edit.html?id=${c.id}" class="btn-secondary btn-sm">编辑</a>` : ''}
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('status-filter').addEventListener('change', loadContracts);
    document.getElementById('search-input').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') loadContracts();
    });

    init();
  </script>
</body>
</html>
