<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 企业合同管理系统</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header id="nav-container"></header>
  <main class="container">
    <h2>用户管理</h2>

    <!-- 创建用户表单 -->
    <div class="card">
      <h3 id="form-title">创建用户</h3>
      <form id="user-form">
        <div class="form-row">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" required minlength="2" maxlength="50" placeholder="请输入用户名">
          </div>
          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" required placeholder="请输入邮箱">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" required minlength="6" placeholder="至少6位">
          </div>
          <div class="form-group">
            <label for="role">角色</label>
            <select id="role">
              <option value="handler">经办人 (handler)</option>
              <option value="approver">审批人 (approver)</option>
              <option value="admin">管理员 (admin)</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">创建用户</button>
        </div>
        <div id="form-message"></div>
      </form>
    </div>

    <!-- 用户列表 -->
    <div class="card">
      <h3>用户列表</h3>
      <div id="user-table"></div>
    </div>
  </main>
  <script type="module">
    import { checkSession, renderNav } from '/assets/js/session-ui.js';
    import { fetchUsers, renderUserTable, createUser, toggleUser } from '/assets/js/admin.js';

    const user = await checkSession();
    if (!user) window.location.href = '/pages/public/login.html';
    renderNav(user);

    const form = document.getElementById('user-form');
    const tableContainer = document.getElementById('user-table');
    const msgEl = document.getElementById('form-message');

    async function refreshUsers() {
      const users = await fetchUsers();
      if (users) renderUserTable(users);
    }

    function showMessage(msg, isError) {
      msgEl.className = isError ? 'error-message' : 'success-message';
      msgEl.textContent = msg;
      if (!isError) setTimeout(() => { msgEl.textContent = ''; msgEl.className = ''; }, 3000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
      };
      const result = await createUser(data);
      if (result.error) {
        showMessage(result.error.message ?? '创建失败', true);
        return;
      }
      showMessage(`用户 ${result.user.username} 创建成功`, false);
      form.reset();
      await refreshUsers();
    });

    // 委托事件处理启用/禁用按钮
    tableContainer.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-toggle-user]');
      if (!btn) return;
      const userId = btn.dataset.toggleUser;
      const isActive = btn.dataset.active === 'true';
      const result = await toggleUser(userId, !isActive);
      if (result.error) {
        alert(result.error.message ?? '操作失败');
        return;
      }
      await refreshUsers();
    });

    await refreshUsers();
  </script>
</body>
</html>
