<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据看板 - 企业合同管理系统</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header id="nav-container"></header>
  <main class="container">
    <h2>数据看板</h2>
    <div id="stats-container"></div>
    <div id="status-distribution"></div>
  </main>
  <script type="module">
    import { checkSession, renderNav } from '/assets/js/session-ui.js';
    import { fetchStats, renderStatCards, renderStatusDistribution } from '/assets/js/admin.js';

    const user = await checkSession();
    if (!user) window.location.href = '/pages/public/login.html';

    renderNav(user);

    const stats = await fetchStats();
    if (stats) {
      renderStatCards(stats);
      renderStatusDistribution(stats);
    }
  </script>
</body>
</html>
