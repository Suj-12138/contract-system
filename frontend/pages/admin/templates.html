<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模板管理 - 企业合同管理系统</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .inline-form {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .inline-form input, .inline-form select {
      flex: 1;
      min-width: 100px;
    }
    .field-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }
    .field-row select, .field-row input {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <div class="container">
    <h2>模板管理</h2>

    <!-- 新建 / 编辑表单 -->
    <div class="card" id="form-card" style="display:none;">
      <h3 id="form-title">新建模板</h3>
      <form id="template-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label for="tpl-name">模板名称 *</label>
          <input type="text" id="tpl-name" required maxlength="100" placeholder="例如：标准采购合同">
        </div>
        <div class="form-group">
          <label for="tpl-desc">描述</label>
          <input type="text" id="tpl-desc" maxlength="200" placeholder="模板用途说明">
        </div>
        <div class="form-group">
          <label>字段定义</label>
          <div id="fields-container"></div>
          <button type="button" id="add-field" class="btn-secondary btn-sm">+ 添加字段</button>
        </div>
        <div id="tpl-msg" style="margin-top:8px;"></div>
        <button type="submit" class="btn-primary">保存</button>
        <button type="button" id="cancel-form" class="btn-secondary">取消</button>
      </form>
    </div>

    <!-- 模板列表 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">模板列表</h3>
        <button id="new-template" class="btn-primary">新建模板</button>
      </div>
      <table id="tpl-table">
        <thead><tr><th>名称</th><th>描述</th><th>字段数</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script type="module">
    import { apiRequest } from '/assets/js/api-client.js';
    import { checkSession, renderNav } from '/assets/js/session-ui.js';

    const user = await checkSession();
    if (!user) throw new Error('未登录');
    if (user.role !== 'admin') {
      document.querySelector('.container').innerHTML = '<div class="error-message">仅管理员可访问</div>';
      throw new Error('仅管理员');
    }
    renderNav(user);
    loadTemplates();

    async function loadTemplates() {
      const result = await apiRequest('/api/v1/templates/');
      if (result.error) {
        document.querySelector('#tpl-table tbody').innerHTML = `<tr><td colspan="6">加载失败: ${result.error.message}</td></tr>`;
        return;
      }
      const templates = result.templates || [];
      document.querySelector('#tpl-table tbody').innerHTML = templates.map(t => `
        <tr>
          <td>${escapeHtml(t.name)}</td>
          <td>${escapeHtml(t.description || '-')}</td>
          <td>${(t.fields_json || []).length}</td>
          <td><span style="color:${t.is_active ? '#52c41a' : '#999'};">${t.is_active ? '启用' : '停用'}</span></td>
          <td>${t.created_at ? t.created_at.slice(0,10) : '-'}</td>
          <td>
            <button class="btn-sm btn-secondary edit-tpl" data-id="${t.id}">编辑</button>
            <button class="btn-sm ${t.is_active ? 'btn-danger' : 'btn-primary'} toggle-tpl" data-id="${t.id}" data-active="${t.is_active}">${t.is_active ? '停用' : '启用'}</button>
          </td>
        </tr>
      `).join('');

      document.querySelectorAll('.edit-tpl').forEach(btn => btn.addEventListener('click', () => editTemplate(btn.dataset.id)));
      document.querySelectorAll('.toggle-tpl').forEach(btn => {
        btn.addEventListener('click', async () => {
          const tid = btn.dataset.id;
          const isActive = btn.dataset.active === 'true';
          const result = await apiRequest(`/api/v1/templates/${tid}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ is_active: !isActive }),
          });
          if (result.error) { alert(result.error.message); return; }
          loadTemplates();
        });
      });
    }

    function createFieldRow(label, type, required) {
      const row = document.createElement('div');
      row.className = 'field-row';
      row.innerHTML = `
        <input type="text" class="field-label" value="${escapeHtml(label || '')}" placeholder="字段名" style="flex:2;">
        <select class="field-type" style="flex:1;">
          <option value="text" ${type==='text'?'selected':''}>文本</option>
          <option value="number" ${type==='number'?'selected':''}>数字</option>
          <option value="date" ${type==='date'?'selected':''}>日期</option>
          <option value="textarea" ${type==='textarea'?'selected':''}>文本域</option>
        </select>
        <label style="white-space:nowrap;margin:0;font-size:14px;"><input type="checkbox" class="field-required" ${required?'checked':''}> 必填</label>
        <button type="button" class="btn-danger btn-sm remove-field">删除</button>
      `;
      row.querySelector('.remove-field').addEventListener('click', () => row.remove());
      return row;
    }

    function getFields() {
      const rows = document.querySelectorAll('#fields-container .field-row');
      const fields = [];
      rows.forEach(row => {
        const label = row.querySelector('.field-label').value.trim();
        if (!label) return;
        fields.push({
          label,
          type: row.querySelector('.field-type').value,
          required: row.querySelector('.field-required').checked,
        });
      });
      return fields;
    }

    document.getElementById('add-field').addEventListener('click', () => {
      document.getElementById('fields-container').appendChild(createFieldRow('', 'text', false));
    });

    document.getElementById('new-template').addEventListener('click', () => {
      document.getElementById('form-card').style.display = 'block';
      document.getElementById('form-title').textContent = '新建模板';
      document.getElementById('edit-id').value = '';
      document.getElementById('tpl-name').value = '';
      document.getElementById('tpl-desc').value = '';
      document.getElementById('fields-container').innerHTML = '';
      document.getElementById('tpl-msg').innerHTML = '';
      createFieldRow('甲方', 'text', true);
      createFieldRow('乙方', 'text', true);
      createFieldRow('合同金额', 'number', true);
      createFieldRow('交付日期', 'date', true);
      createFieldRow('主要条款', 'textarea', true);
    });

    document.getElementById('cancel-form').addEventListener('click', () => {
      document.getElementById('form-card').style.display = 'none';
    });

    async function editTemplate(id) {
      const result = await apiRequest('/api/v1/templates/');
      if (result.error) return;
      const t = (result.templates || []).find(t => t.id === id);
      if (!t) return;
      document.getElementById('form-card').style.display = 'block';
      document.getElementById('form-title').textContent = '编辑模板';
      document.getElementById('edit-id').value = t.id;
      document.getElementById('tpl-name').value = t.name;
      document.getElementById('tpl-desc').value = t.description || '';
      document.getElementById('fields-container').innerHTML = '';
      (t.fields_json || []).forEach(f => {
        document.getElementById('fields-container').appendChild(createFieldRow(f.label, f.type, f.required));
      });
      document.getElementById('tpl-msg').innerHTML = '';
    }

    document.getElementById('template-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const editId = document.getElementById('edit-id').value;
      const body = {
        name: document.getElementById('tpl-name').value,
        description: document.getElementById('tpl-desc').value,
        fields_json: getFields(),
      };
      const msgEl = document.getElementById('tpl-msg');
      let result;
      if (editId) {
        result = await apiRequest(`/api/v1/templates/${editId}`, {
          method: 'PUT',
          body: JSON.stringify(body),
        });
      } else {
        result = await apiRequest('/api/v1/templates/', {
          method: 'POST',
          body: JSON.stringify(body),
        });
      }
      if (result.error) {
        msgEl.innerHTML = `<div class="error-message">${result.error.message}</div>`;
        return;
      }
      msgEl.innerHTML = '<div class="success-message">保存成功</div>';
      setTimeout(() => {
        document.getElementById('form-card').style.display = 'none';
        loadTemplates();
      }, 500);
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
